    <script>
        /**
         * 从URL获取参数并加载文章详情
         * 支持三种模式:
         * 1. ?id=123 - 直接通过 ID 获取
         * 2. ?slug=xxx - 通过 slug 搜索
         * 3. /article/faq-what-is-leverage - URL 路径格式（SEO 友好）
         */
        async function loadArticle() {
            try {
                // 获取 API 服务器地址
                let API_URL = location.origin.replace(/\/$/, '');
                // 如果前端运行在8000端口，重定向到后端8001端口
                if (location.port === '8000') {
                    API_URL = location.protocol + '//' + location.hostname + ':8001';
                }
                
                // 从URL查询参数或路径获取 ID 或 slug
                const urlParams = new URLSearchParams(window.location.search);
                let articleId = urlParams.get('id');
                let slug = urlParams.get('slug');
                
                // 如果没有查询参数，尝试从路径提取 slug
                if (!articleId && !slug) {
                    const path = location.pathname;
                    // 从 /article/ 后面提取 slug，支持格式: /article/faq-what-is-leverage
                    const match = path.match(/\/article\/([^\/]+)(?:\/)?$/);
                    if (match) {
                        slug = match[1];
                    }
                }

                if (!articleId && !slug) {
                    showError('未指定文章，请从列表页面选择文章');
                    return;
                }

                let response;
                let article = null;
                
                // 根据参数选择加载方式
                if (articleId) {
                    // 方式 1: 直接通过 ID 获取（速度最快）
                    console.log(`加载方式: ID (${articleId})`);
                    response = await fetch(`${API_URL}/api/articles/${articleId}`, {
                        method: 'GET',
                        headers: {
                            'Accept': 'application/json'
                        }
                    });
                    
                    if (response.ok) {
                        const data = await response.json();
                        // API 直接返回对象
                        article = data;
                    }
                } else if (slug) {
                    // 方式 2: 通过 slug 搜索
                    console.log(`加载方式: Slug (${slug})`);
                    
                    // 先尝试用 slug 作为关键词搜索
                    const keyword = slug.replace(/faq-|wiki-|guide-/g, '').replace(/-/g, ' ');
                    response = await fetch(`${API_URL}/api/articles/search/by-keyword?keyword=${encodeURIComponent(keyword)}&limit=1`, {
                        method: 'GET',
                        headers: {
                            'Accept': 'application/json'
                        }
                    });
                    
                    if (response.ok) {
                        const result = await response.json();
                        // 处理数组响应
                        if (Array.isArray(result) && result.length > 0) {
                            article = result[0];
                        } else if (result.data && Array.isArray(result.data) && result.data.length > 0) {
                            article = result.data[0];
                        }
                    }
                }

                // 检查响应状态
                if (!response) {
                    showError('无法连接到 API 服务器');
                    return;
                }

                if (!response.ok) {
                    showError(`加载文章失败: ${response.statusText}`);
                    return;
                }

                if (!article || !article.id) {
                    showError('未找到指定的文章');
                    return;
                }

                // 如果是通过 slug 搜索的，验证 slug 是否匹配
                if (slug && article.slug !== slug) {
                    console.warn(`Warning: slug 不匹配 (期望: ${slug}, 实际: ${article.slug})，但继续显示文章`);
                }

                displayArticle(article);

            } catch (error) {
                console.error('加载文章时出错:', error);
                showError(`加载文章时出错: ${error.message}`);
            }
        }

        /**
         * 显示文章内容
         */
        function displayArticle(article) {
            // 隐藏加载状态
            document.getElementById('loading').style.display = 'none';

            // 填充文章数据
            document.getElementById('article-title').textContent = article.title || '无标题';
            document.getElementById('article-content').innerHTML = formatContent(article.content || article.summary || '暂无内容');
            document.getElementById('article-views').textContent = article.view_count || 0;
            document.getElementById('article-likes').textContent = article.like_count || 0;
            document.getElementById('article-section').textContent = article.section_name || article.section?.name || '未分类';
            document.getElementById('article-category').textContent = article.category_name || article.category || '未分类';
            
            // 格式化日期
            const date = new Date(article.published_at || article.created_at);
            document.getElementById('article-date').textContent = date.toLocaleDateString('zh-CN', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit'
            });

            // ✅ 动态更新SEO元数据
            // 只设置页面标题，站点名称后缀由 site-settings.js 动态追加
            const pageTitle = article.title;
            document.title = pageTitle;
            
            // 更新meta标签
            updateMetaTag('title', pageTitle);
            updateMetaTag('og:title', pageTitle);
            
            // 描述：优先使用summary，其次使用content的前150字符
            const description = article.summary || 
                                (article.content || '').replace(/[#*_\[\]`~]/g, '').substring(0, 150).trim() ||
                                `阅读关于"${article.title}"的详细文章，深入了解股票杠杆交易知识`;
            updateMetaTag('description', description);
            updateMetaTag('og:description', description);
            
            // 关键词：结合分类、标题、以及文章原有的关键词
            const keywords = [
                article.keywords || '',
                article.title,
                article.category_name || article.category || '',
                '股票杠杆',
                '平台',
                '交易'
            ].filter(Boolean).join(',');
            updateMetaTag('keywords', keywords);
            
            // Open Graph元数据（用于社交媒体分享）
            updateMetaTag('og:url', location.href);
            updateMetaTag('og:type', 'article');

            // 显示文章
            document.getElementById('article').style.display = 'block';
        }

        /**
         * 更新或创建meta标签
         */
        function updateMetaTag(name, content) {
            let meta = document.querySelector(`meta[name="${name}"]`);
            if (!meta) {
                meta = document.querySelector(`meta[property="${name}"]`);
            }
            if (!meta) {
                meta = document.createElement('meta');
                meta.setAttribute(name.startsWith('og:') ? 'property' : 'name', name);
                document.head.appendChild(meta);
            }
            meta.setAttribute('content', content);
        }

        /**
         * 格式化内容 (支持Markdown格式和HTML格式)
         */
        function formatContent(text) {
            if (!text) return '';
            
            try {
                // 检测内容类型
                const hasHtmlTags = /<[a-z][\s\S]*>/i.test(text);
                const hasMarkdownSyntax = /#{1,6}\s|\*\*[^*]+\*\*|\*\s|^-\s|^\d+\.\s|```|`[^`]+`/m.test(text);
                
                let processedContent = text;
                
                // 如果内容被 <p> 包裹但里面有 Markdown 语法
                // 典型格式: <p># 标题</p><p>## 副标题</p><p>内容...</p>
                if (hasHtmlTags && hasMarkdownSyntax) {
                    // 将 </p><p> 或 </p> <p> 替换为双换行（保留段落结构）
                    processedContent = text
                        .replace(/<\/p>\s*<p>/gi, '\n\n')
                        .replace(/<p>/gi, '')
                        .replace(/<\/p>/gi, '\n')
                        .replace(/<br\s*\/?>/gi, '\n')
                        // 清理其他可能的HTML标签
                        .replace(/<[^>]+>/g, '')
                        // 清理多余的空行
                        .replace(/\n{3,}/g, '\n\n')
                        .trim();
                }
                
                // 如果是纯 HTML（没有 Markdown 语法），直接清理后返回
                if (hasHtmlTags && !hasMarkdownSyntax) {
                    return DOMPurify.sanitize(text, {
                        ALLOWED_TAGS: ['h1', 'h2', 'h3', 'h4', 'h5', 'h6', 'p', 'br', 'strong', 'em', 'u', 'del', 
                                       'ul', 'ol', 'li', 'blockquote', 'code', 'pre', 'a', 'img', 'table', 'thead', 
                                       'tbody', 'tr', 'td', 'th', 'div', 'span'],
                        ALLOWED_ATTR: ['href', 'title', 'target', 'rel', 'src', 'alt', 'class']
                    });
                }
                
                // 使用marked.js解析Markdown
                const html = marked.parse(processedContent);
                
                // 使用DOMPurify清理HTML，防止XSS
                const cleaned = DOMPurify.sanitize(html, {
                    ALLOWED_TAGS: ['h1', 'h2', 'h3', 'h4', 'h5', 'h6', 'p', 'br', 'strong', 'em', 'u', 'del', 
                                   'ul', 'ol', 'li', 'blockquote', 'code', 'pre', 'a', 'img', 'table', 'thead', 
                                   'tbody', 'tr', 'td', 'th'],
                    ALLOWED_ATTR: ['href', 'title', 'target', 'rel', 'src', 'alt']
                });
                
                return cleaned;
            } catch (error) {
                console.error('内容格式化错误:', error);
                // 降级处理：直接返回清理后的内容
                return DOMPurify.sanitize(text, {
                    ALLOWED_TAGS: ['h1', 'h2', 'h3', 'h4', 'h5', 'h6', 'p', 'br', 'strong', 'em', 'u', 'del', 
                                   'ul', 'ol', 'li', 'blockquote', 'code', 'pre', 'a', 'img'],
                    ALLOWED_ATTR: ['href', 'title', 'target', 'rel', 'src', 'alt']
                });
            }
        }

        /**
         * 显示错误信息
         */
        function showError(message) {
            document.getElementById('loading').style.display = 'none';
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
        }

        // 页面加载完成后加载文章
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', loadArticle);
        } else {
            loadArticle();
        }
    </script>
